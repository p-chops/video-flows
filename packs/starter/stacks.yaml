stacks:
  starter_glow:
    shaders: [starter_glow]
    shader_params:
      starter_glow:
        glow_strength: [0.3, 0.8]
        hue: [0.0, 1.0]

  mosaic_glow:
    shaders: [starter_mosaic, starter_glow]
    shader_params:
      starter_mosaic:
        block_size: [0.01, 0.04]
        color_levels: {choice: [4, 6, 8, 12]}
      starter_glow:
        glow_strength: [0.4, 0.9]
        hue: [0.0, 1.0]

  split_invert:
    shaders: [starter_shift, starter_invert_luma]
    shader_params:
      starter_shift:
        amount: [0.005, 0.03]
        angle: [0.0, 6.28]
      starter_invert_luma:
        mix_amount: [0.5, 1.0]
        threshold: [0.2, 0.6]

  chunky_shift:
    shaders: [starter_mosaic, starter_shift]
    shader_params:
      starter_mosaic:
        block_size: [0.02, 0.06]
        color_levels: {choice: [3, 4, 5, 6]}
      starter_shift:
        amount: [0.01, 0.04]
        angle: [0.0, 6.28]

  glow_invert:
    shaders: [starter_glow, starter_invert_luma, starter_shift]
    shader_params:
      starter_glow:
        glow_strength: [0.5, 1.0]
        hue: [0.0, 1.0]
      starter_invert_luma:
        mix_amount: [0.3, 0.8]
        threshold: [0.3, 0.7]
      starter_shift:
        amount: [0.003, 0.015]
        angle: [0.0, 6.28]

  # --- New stacks using new shaders ---

  warped_duotone:
    shaders: [starter_warp, starter_duotone]
    shader_params:
      starter_warp:
        amplitude: [0.02, 0.08]
        frequency: [3.0, 10.0]
        layers: {choice: [2, 3, 4]}
      starter_duotone:
        shadow_hue: [0.5, 0.75]
        highlight_hue: [0.0, 0.2]
        contrast: [1.0, 2.0]
        saturation: [0.5, 0.9]

  kaleido_glow:
    shaders: [starter_kaleido, starter_glow]
    shader_params:
      starter_kaleido:
        segments: {choice: [4, 6, 8, 12]}
        zoom: [0.8, 2.0]
        spin: [0.05, 0.4]
      starter_glow:
        glow_strength: [0.4, 0.9]
        hue: [0.0, 1.0]

  crt_mosaic:
    shaders: [starter_mosaic, starter_scanline]
    shader_params:
      starter_mosaic:
        block_size: [0.008, 0.03]
        color_levels: {choice: [4, 6, 8]}
      starter_scanline:
        line_count: [150.0, 400.0]
        line_darkness: [0.2, 0.5]
        barrel: [0.05, 0.25]
        phosphor: [0.2, 0.6]

  liquid_kaleido:
    shaders: [starter_warp, starter_kaleido, starter_shift]
    shader_params:
      starter_warp:
        amplitude: [0.03, 0.10]
        frequency: [2.0, 6.0]
        speed: [0.3, 0.8]
        layers: {choice: [3, 4, 5]}
      starter_kaleido:
        segments: {choice: [3, 5, 6, 8]}
        zoom: [0.7, 1.5]
        spin: [0.1, 0.5]
      starter_shift:
        amount: [0.005, 0.02]
        angle: [0.0, 6.28]

  duotone_scanline:
    shaders: [starter_duotone, starter_scanline, starter_shift]
    shader_params:
      starter_duotone:
        shadow_hue: [0.0, 1.0]
        highlight_hue: [0.0, 1.0]
        contrast: [1.2, 2.5]
        saturation: [0.6, 1.0]
      starter_scanline:
        line_count: [200.0, 500.0]
        line_darkness: [0.3, 0.6]
        barrel: [0.1, 0.3]
        phosphor: [0.3, 0.7]
        roll_speed: [0.0, 0.3]
      starter_shift:
        amount: [0.003, 0.012]
        angle: [0.0, 6.28]

  deep_warp:
    shaders: [starter_warp, starter_invert_luma, starter_warp]
    shader_params:
      starter_warp:
        amplitude: [0.02, 0.06]
        frequency: [4.0, 12.0]
        layers: {choice: [2, 3, 4]}
      starter_invert_luma:
        mix_amount: [0.3, 0.7]
        threshold: [0.3, 0.6]

  tunnel_warp:
    shaders: [starter_kaleido, starter_warp, starter_glow]
    shader_params:
      starter_kaleido:
        segments: {choice: [3, 4, 6]}
        zoom: [1.0, 2.5]
        spin: [0.15, 0.6]
      starter_warp:
        amplitude: [0.01, 0.04]
        frequency: [3.0, 8.0]
        layers: {choice: [2, 3]}
      starter_glow:
        glow_strength: [0.5, 1.0]
        hue: [0.0, 1.0]
